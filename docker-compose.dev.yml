services:
  db:
    image: postgres:15
    container_name: lectures-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: lectures
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # порт наружу — удобно для локальных инструментов (psql/DB client)
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d lectures"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lectures-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./backend/.env
    # монтируем только пакет приложения и uploads, чтобы не перекрыть alembic.ini/migrations в /app
    volumes:
      - ./backend/app:/app/app
      - ./backend/uploads:/app/uploads
      - ./backend/uploads-data:/data/uploads
      - hf_cache:/data/h
    ports:
      - "8000:8000"
    # start.sh должен внутри образа вызывать: alembic -c /app/alembic.ini upgrade head && uvicorn ...
    command: ["/app/start.sh"]
    environment:
    - HF_HOME=/data/hf
    - TRANSFORMERS_CACHE=/data/hf
    - HUGGINGFACE_HUB_CACHE=/data/hf
    - TRANSLATE_BACKEND=libre
    - LIBRETRANSLATE_URL=http://libretranslate:5000



  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lectures-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

  libretranslate:
    image: libretranslate/libretranslate:latest
    environment:
      - LT_LOAD_ONLY=en,ru,de,fr,es,it,pt,tr
    ports:
      - "5000:5000"

volumes:
  postgres_data: {}
  uploads-data: {}
  hf_cache: {}
