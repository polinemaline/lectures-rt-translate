server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Главное место: SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Это можно оставить как есть, т.к. фронт ходит к бэку напрямую по http://localhost:8000
    # Если захочешь проксировать через nginx, тут можно будет позже добавить:
    # location /api/ {
    #     proxy_pass http://backend:8000;
    # }
}
